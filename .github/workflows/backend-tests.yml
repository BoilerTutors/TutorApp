name: backend-tests

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      TEST_DB_HOST: ${{ secrets.TEST_DB_HOST }}
      TEST_DB_PORT: ${{ secrets.TEST_DB_PORT }}
      TEST_DB_NAME: ${{ secrets.TEST_DB_NAME }}
      TEST_DB_USERNAME: ${{ secrets.TEST_DB_USERNAME }}
      TEST_DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
      TEST_DB_SSL_MODE: ${{ secrets.TEST_DB_SSL_MODE }}
      TEST_DB_SSL_ROOT_CERT: ${{ secrets.TEST_DB_SSL_ROOT_CERT }}

      # app/config.py requires these at import time
      secret_key: ${{ secrets.SECRET_KEY }}
      algorithm: HS256
      access_token_expire_minutes: "30"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests
        working-directory: backend
        run: |
          pytest -q --cov=app --cov-report=term-missing