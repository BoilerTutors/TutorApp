name: backend-tests

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tutorapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d tutorapp_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      # tests/conftest.py: full URL uses local service (no TEST_DB_* or SSL in CI)
      TESTING_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/tutorapp_test

      # app/config.py requires these at import time
      secret_key: ${{ secrets.SECRET_KEY }}
      algorithm: HS256
      access_token_expire_minutes: "30"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests
        working-directory: backend
        run: |
          pytest -q --cov=app --cov-report=term-missing